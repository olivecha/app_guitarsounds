<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse comparative de sons de guitare — V 3.0</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="icon" type="image/png" href="documentation/figures/logo.png" />

  <!-- CDN libraries (loaded as globals before ES modules) -->
  <!-- Plotly: window.Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <!-- marked: window.marked  (use marked.parse(text)) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- docx: window.docx -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <!-- FFT: implemented in src/guitarsounds/signal.js (no CDN needed) -->
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <img src="documentation/figures/logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'" />
    <div class="header-text">
      <h1 class="header-title">Analyse comparative de sons de guitare</h1>
      <span class="header-version">V 3.0</span>
    </div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="add">Ajouter des sons</button>
    <button class="tab-btn" data-tab="analyse">Analyser / Comparer</button>
    <button class="tab-btn" data-tab="rapport">
      Rapport <span id="report-tab-badge" class="tab-badge" style="display:none"></span>
    </button>
    <button class="tab-btn" data-tab="aide">Aide</button>
    <button class="tab-btn" data-tab="apropos">À Propos</button>
  </nav>

  <!-- Tab panels -->
  <main class="tab-content">
    <section id="tab-add" class="tab-panel active">
      <!-- populated by ui/soundManager.js -->
    </section>

    <section id="tab-analyse" class="tab-panel">
      <!-- populated by ui/analysisPanel.js -->
    </section>

    <section id="tab-rapport" class="tab-panel">
      <!-- populated by ui/reportPanel.js -->
    </section>

    <section id="tab-aide" class="tab-panel">
      <div id="aide-content" class="markdown-body">Chargement…</div>
    </section>

    <section id="tab-apropos" class="tab-panel">
      <div id="apropos-content" class="markdown-body">Chargement…</div>
    </section>
  </main>

  <!-- ES module entry point (loaded after CDN globals are ready) -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
